{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold">Explore the Community</h2>
        <p class="text-muted">Connect with other creators and builders in the Knot network.</p>
        <div class="mx-auto" style="width: 50px; height: 3px; background: var(--logo-primary); border-radius: 2px;"></div>
    </div>

    <div class="row g-4">
        {% for company in companys %}
        <div class="col-xl-3 col-lg-4 col-sm-6">
            <div class="card border-0 shadow-sm rounded-4 h-100 text-center p-3 user-card">
                <div class="card-body">
                    <div class="position-relative d-inline-block mb-3">
                        <img src="{{ url_for('static', filename='profile_pics/' + company.image_file) }}" 
                             alt="{{ company.username }}" 
                             class="rounded-circle border border-3 border-white shadow-sm" 
                             width="100" height="100" style="object-fit: cover;">
                        <span class="position-absolute bottom-0 end-0 p-2 bg-success border border-2 border-white rounded-circle"></span>
                    </div>

                    <h5 class="fw-bold mb-1">{{ company.username }}</h5>
                    <p class="text-muted small mb-3">{{ company.email }}</p>

                    <div class="d-flex justify-content-center gap-3 mb-4">
                        <div class="text-center">
                            <div class="fw-bold small">{{ company.posts|length }}</div>
                            <div class="x-small text-muted text-uppercase">Posts</div>
                        </div>
                        
                    </div>

                    <div class="d-grid">
                        <a href="{{ url_for('company.profile', username=company.username) }}" 
                           class="btn btn-outline-primary btn-sm rounded-pill px-4 fw-bold">
                            View Profile
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-primary btn-sm rounded-pill px-4">
        <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
    </a>
    </div>
</div>
{% endblock %}
