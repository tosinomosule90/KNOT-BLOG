{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="text-center">
        <div class="welcome-icon-container mb-4">
            <div class="bg-primary d-inline-flex align-items-center justify-content-center rounded-circle shadow-lg" 
                 style="width: 100px; height: 100px; animation: pulse 2s infinite;">
                <i class="fas fa-rocket text-white fs-1"></i>
            </div>
        </div>

        <h1 class="display-4 fw-bold text-dark mb-2">Welcome back, {{ current_user.username }}!</h1>
        <p class="lead text-muted mb-5">We're getting your personalized feed ready...</p>

        <div class="d-flex justify-content-center mb-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('company.dashboard') }}" class="btn btn-primary btn-lg px-5 rounded-pill shadow">
                Go to Dashboard <i class="fas fa-arrow-right ms-2"></i>
            </a>
        </div>
    </div>
</div>

<script>
    setTimeout(function() {
        window.location.href = "{{ url_for('company.dashboard') }}";
    }, 8000);
</script>

<style>
@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(13, 110, 253, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 110, 253, 0); }
}
</style>
{% endblock %}
